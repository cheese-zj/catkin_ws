    # Higher kp values when in slave follow mode (to follow master arm)
    kp_follow: [10.0, 10.0, 10.0, 10.0, 10.0, 10.0]
  
  # Topic names (relative to topic_prefix)
  gripper_pos_cmd_topic: "gripper_pos_cmd"
  gripper_effort_cmd_topic: "gripper_effort_cmd"
  p:
